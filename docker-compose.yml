version: '3.8'

services:
  # -----------------------------------------------------------------
  # Redis Cluster / Single Instance (Atomic Token Bucket & Concurrency)
  # -----------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: adaptive-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -----------------------------------------------------------------
  # Apache Kafka & Zookeeper (Real-Time Telemetry Stream)
  # -----------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: adaptive-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: adaptive-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # PostgreSQL (Business Service Database with Synthetic Delays)
  # -----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: adaptive-postgres
    environment:
      POSTGRES_USER: uber_user
      POSTGRES_PASSWORD: uber_password
      POSTGRES_DB: uber_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uber_user -d uber_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -----------------------------------------------------------------
  # Observability: Prometheus
  # -----------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: adaptive-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # -----------------------------------------------------------------
  # Observability: Grafana
  # -----------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: adaptive-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus

  # -----------------------------------------------------------------
  # Business Microservices & Control Plane
  # -----------------------------------------------------------------
  api-gateway:
    build: ./api-gateway
    container_name: adaptive-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - kafka
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - ORDER_SERVICE_URL=http://adaptive-order-service:8081
      - DRIVER_SERVICE_URL=http://adaptive-driver-service:8082

  control-plane-service:
    build: ./control-plane-service
    container_name: adaptive-control-plane
    ports:
      - "8090:8090"
    depends_on:
      - redis
      - kafka
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  order-service:
    build: ./order-service
    container_name: adaptive-order-service
    ports:
      - "8081:8081"
    depends_on:
      - redis
      - kafka
      - postgres
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/uber_db
      - SPRING_DATASOURCE_USERNAME=uber_user
      - SPRING_DATASOURCE_PASSWORD=uber_password

  driver-service:
    build: ./driver-service
    container_name: adaptive-driver-service
    ports:
      - "8082:8082"
    depends_on:
      - redis
      - kafka
      - postgres
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/uber_db
      - SPRING_DATASOURCE_USERNAME=uber_user
      - SPRING_DATASOURCE_PASSWORD=uber_password

networks:
  default:
    name: adaptive-load-network
