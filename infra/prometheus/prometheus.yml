global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['adaptive-api-gateway:8080']

  - job_name: 'order-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['adaptive-order-service:8081']

  - job_name: 'driver-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['adaptive-driver-service:8082']

  - job_name: 'control-plane-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['adaptive-control-plane:8090']
